openapi: 3.1.0
info:
  title: Image Generation API
  description: Batch image generation via Google Nano Banana 2
  version: 1.0.0

servers:
  - url: http://localhost:3100

paths:
  /generate:
    post:
      operationId: generateBatch
      summary: Start batch image generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /status:
    get:
      operationId: listBatches
      summary: List all batches with summary stats
      responses:
        '200':
          description: List of batch summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BatchSummary'

  /status/{batchId}:
    get:
      operationId: getBatchStatus
      summary: Get detailed status of a batch
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Batch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatus'
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    GenerateItem:
      type: object
      required:
        - id
        - description
      properties:
        id:
          type: string
        description:
          type: string
        referenceImages:
          type: array
          items:
            type: string
            format: uri

    GenerateRequest:
      type: object
      required:
        - items
      properties:
        masterPrompt:
          type: string
        negativePrompt:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/GenerateItem'

    GenerateResponse:
      type: object
      required:
        - batchId
        - itemIds
      properties:
        batchId:
          type: string
          format: uuid
        itemIds:
          type: array
          items:
            type: string

    FailedItem:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        error:
          type: string

    BatchStatus:
      type: object
      required:
        - batchId
        - createdAt
        - total
        - completed
        - pending
        - failed
        - done
      properties:
        batchId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        total:
          type: integer
        completed:
          type: array
          items:
            type: string
        pending:
          type: array
          items:
            type: string
        failed:
          type: array
          items:
            $ref: '#/components/schemas/FailedItem'
        done:
          type: boolean

    BatchSummary:
      type: object
      required:
        - batchId
        - createdAt
        - total
        - completed
        - pending
        - failed
      properties:
        batchId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        total:
          type: integer
        completed:
          type: integer
        pending:
          type: integer
        failed:
          type: integer

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
