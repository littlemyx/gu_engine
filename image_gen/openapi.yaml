openapi: 3.1.0
info:
  title: Image Generation API
  description: Batch image generation via Google Nano Banana 2
  version: 1.0.0

servers:
  - url: http://localhost:3100

paths:
  /generate:
    post:
      operationId: generateBatch
      summary: Start batch image generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /generate/character:
    post:
      operationId: generateCharacter
      summary: Generate character images in multiple poses
      description: >
        Generates character images. First creates an idle pose, then uses it as reference
        to generate all other requested poses in parallel. All poses are rendered on transparent background.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterGenerateRequest'
      responses:
        '200':
          description: Character generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /generate/character/pose:
    post:
      operationId: regenerateCharacterPose
      summary: Regenerate a single character pose using an existing reference image
      description: >
        Generates a single pose image using a provided reference image (e.g. the existing idle pose).
        Does not generate idle — uses the supplied referenceImageUrl as-is.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegeneratePoseRequest'
      responses:
        '200':
          description: Pose regeneration batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /generate/background:
    post:
      operationId: generateBackground
      summary: Generate a background/environment scene
      description: >
        Generates a single background image suitable as a visual novel backdrop.
        No characters are included — only environment and scenery.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackgroundGenerateRequest'
      responses:
        '200':
          description: Background generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /status:
    get:
      operationId: listBatches
      summary: List all batches with summary stats
      responses:
        '200':
          description: List of batch summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BatchSummary'

  /status/{batchId}:
    get:
      operationId: getBatchStatus
      summary: Get detailed status of a batch
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Batch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatus'
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    GenerateItem:
      type: object
      required:
        - id
        - description
      properties:
        id:
          type: string
        description:
          type: string
        referenceImages:
          type: array
          items:
            type: string
            format: uri

    GenerateRequest:
      type: object
      required:
        - items
      properties:
        masterPrompt:
          type: string
        negativePrompt:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/GenerateItem'

    GenerateResponse:
      type: object
      required:
        - batchId
        - itemIds
      properties:
        batchId:
          type: string
          format: uuid
        itemIds:
          type: array
          items:
            type: string

    CompletedItem:
      type: object
      required:
        - id
        - file
      properties:
        id:
          type: string
        file:
          type: string
          description: Generated image file name

    FailedItem:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        error:
          type: string

    BatchStatus:
      type: object
      required:
        - batchId
        - createdAt
        - total
        - completed
        - pending
        - failed
        - done
      properties:
        batchId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        total:
          type: integer
        completed:
          type: array
          items:
            $ref: '#/components/schemas/CompletedItem'
        pending:
          type: array
          items:
            type: string
        failed:
          type: array
          items:
            $ref: '#/components/schemas/FailedItem'
        done:
          type: boolean

    BatchSummary:
      type: object
      required:
        - batchId
        - createdAt
        - total
        - completed
        - pending
        - failed
      properties:
        batchId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        total:
          type: integer
        completed:
          type: integer
        pending:
          type: integer
        failed:
          type: integer

    CharacterGenerateRequest:
      type: object
      required:
        - masterPrompt
        - characterDescription
      properties:
        masterPrompt:
          type: string
          description: Visual style/quality prompt applied to all generated images
        storyMasterPrompt:
          type: string
          description: Story context prompt (world, characters, plot) to inform character visual generation
        characterDescription:
          type: string
          description: Detailed description of the character appearance
        poses:
          type: array
          description: Optional list of poses/emotions to generate. Idle is always included automatically.
          items:
            type: string

    RegeneratePoseRequest:
      type: object
      required:
        - masterPrompt
        - characterDescription
        - pose
        - referenceImageUrl
      properties:
        masterPrompt:
          type: string
          description: Visual style/quality prompt applied to the generated image
        storyMasterPrompt:
          type: string
          description: Story context prompt (world, characters, plot) to inform character visual generation
        characterDescription:
          type: string
          description: Detailed description of the character appearance
        pose:
          type: string
          description: The pose/emotion to generate
        referenceImageUrl:
          type: string
          format: uri
          description: URL of the existing idle pose image to use as style reference

    BackgroundGenerateRequest:
      type: object
      required:
        - masterPrompt
        - sceneDescription
      properties:
        masterPrompt:
          type: string
          description: Global style/quality prompt applied to the generated image
        sceneDescription:
          type: string
          description: Detailed description of the background/environment scene

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
