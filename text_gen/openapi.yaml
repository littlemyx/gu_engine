openapi: 3.1.0
info:
  title: Text Generation API
  description: Async text generation for visual novel prototyping
  version: 1.0.0

servers:
  - url: http://localhost:3200

paths:
  /generate/storyMasterPrompt:
    post:
      operationId: generateStoryMasterPrompt
      summary: Generate a story master prompt (backbone) for a visual novel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoryMasterPromptRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/sceneText:
    post:
      operationId: generateSceneText
      summary: Generate scene text and outputs for a visual novel scene
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SceneTextRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/outline:
    post:
      operationId: generateOutline
      summary: Generate a high-level outline (acts + anchor skeleton) from a brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutlineRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/segment:
    post:
      operationId: generateSegment
      summary: Generate scene-level draft DAG between two outline anchors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SegmentRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/liCards:
    post:
      operationId: generateLiCards
      summary: Generate love interest character cards from a story master prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiCardsRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/narrationWeb:
    post:
      operationId: generateNarrationWeb
      summary: Generate a narration web (exploration DAG) between two story anchors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NarrationWebRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/worldModel:
    post:
      operationId: generateWorldModel
      summary: Build the persistent world model (locations registry with adjacency) from the outline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorldModelRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/worldCalendar:
    post:
      operationId: generateWorldCalendar
      summary: Build world locations, the discrete story calendar and the agenda-tag-to-location map
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorldCalendarRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/spine:
    post:
      operationId: generateSpine
      summary: Generate the story spine (beats with slot windows and guarded endings) over world and calendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpineRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/beatPlan:
    post:
      operationId: generateBeatPlan
      summary: Plan relationship beats across encounter slots of the story outline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BeatPlanRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/anchorBeat:
    post:
      operationId: generateAnchorBeat
      summary: Generate an on-screen beat scene for a story anchor with diegetic transition labels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnchorBeatRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/ending:
    post:
      operationId: generateEnding
      summary: Generate an epilogue variant (good per-LI, or shared normal/bad)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndingRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/dialogueVariant:
    post:
      operationId: generateDialogueVariant
      summary: Generate a dialogue variant for a character encounter at a given relationship bracket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DialogueVariantRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /status:
    get:
      operationId: listBatches
      summary: List all batches with summary stats
      responses:
        '200':
          description: List of batch summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BatchSummary'

  /status/{batchId}:
    get:
      operationId: getBatchStatus
      summary: Get detailed status of a batch
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Batch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatus'
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    StoryMasterPromptRequest:
      type: object
      properties:
        userHint:
          type: string
          description: Optional author wishes / theme hint for the story generation

    GenerateResponse:
      type: object
      required:
        - batchId
        - itemIds
      properties:
        batchId:
          type: string
          format: uuid
        itemIds:
          type: array
          items:
            type: string

    CompletedTextItem:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        result:
          type: string
          description: Generated text content

    FailedItem:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        error:
          type: string

    BatchStatus:
      type: object
      required:
        - batchId
        - createdAt
        - total
        - completed
        - pending
        - failed
        - done
      properties:
        batchId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        total:
          type: integer
        completed:
          type: array
          items:
            $ref: '#/components/schemas/CompletedTextItem'
        pending:
          type: array
          items:
            type: string
        failed:
          type: array
          items:
            $ref: '#/components/schemas/FailedItem'
        done:
          type: boolean

    BatchSummary:
      type: object
      required:
        - batchId
        - createdAt
        - total
        - completed
        - pending
        - failed
      properties:
        batchId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        total:
          type: integer
        completed:
          type: integer
        pending:
          type: integer
        failed:
          type: integer

    SceneChainItem:
      type: object
      required:
        - sceneText
        - outputText
      properties:
        sceneText:
          type: string
          description: Text of a previous scene
        outputText:
          type: string
          description: The choice/output text that led from this scene to the next

    SceneCharacter:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Character name
        description:
          type: string
          description: Character description (appearance, personality, role)

    SceneTextRequest:
      type: object
      required:
        - storyMasterPrompt
        - sceneChain
        - depth
        - maxDepth
        - incomingOutputText
      properties:
        storyMasterPrompt:
          type: string
          description: The story master prompt (backbone of the story)
        sceneChain:
          type: array
          items:
            $ref: '#/components/schemas/SceneChainItem'
          description: Chain of previous scenes leading to this one
        depth:
          type: integer
          description: Depth of this scene from the root (0-based)
        maxDepth:
          type: integer
          description: Estimated maximum depth of the story tree
        incomingOutputText:
          type: string
          description: The output/choice text that leads into this scene
        characters:
          type: array
          items:
            $ref: '#/components/schemas/SceneCharacter'
          description: Characters present in this scene

    OutlineRequest:
      type: object
      required:
        - brief
        - archetypeProfiles
      properties:
        brief:
          type: object
          additionalProperties: true
          description: |
            Procedural narrative brief (Brief in client/src/narrative/types.ts).
            Treated as opaque JSON by text_gen — embedded into the prompt as-is.
        archetypeProfiles:
          type: object
          additionalProperties: true
          description: |
            Map of archetypeId -> ArchetypeProfile, only the archetypes
            referenced by the brief's loveInterests. Embedded into the prompt
            so the LLM knows which beats are required per route.
        targets:
          type: object
          additionalProperties: true
          description: |
            Computed budgets: anchorCount, anchorsPerAct, plotOnlyAnchorCount
            (derived from targetDurationMinutes / commonRouteShare).
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Previously generated outline that failed validation. When present
            alongside previousIssues, the LLM is asked to produce a corrected
            version.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.
    SegmentRequest:
      type: object
      required:
        - brief
        - anchorFrom
        - anchorTo
      properties:
        brief:
          type: object
          additionalProperties: true
          description: Brief context (characters, world, tone, art style, scale).
        archetypeProfile:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            ArchetypeProfile of the LI on this route, or null for common-route
            segments. Used by the LLM to apply trajectory rules and beat themes.
        anchorFrom:
          type: object
          additionalProperties: true
          description: AnchorPlan of the source anchor (segment entry).
        anchorTo:
          type: object
          additionalProperties: true
          description: |
            AnchorPlan of the target anchor (segment exit). Its
            entryStateRequired ranges/flags define the success criterion.
        existingFlags:
          type: array
          items:
            type: string
          description: |
            Flags already established by ancestors of anchorFrom in the outline.
            Helps the LLM stay consistent with what has already happened.
        baselineStateRanges:
          type: object
          additionalProperties:
            type: array
            items:
              type: number
            minItems: 2
            maxItems: 2
          description: |
            Baseline state ranges at segment entry: {[stateVarPath]: [lo, hi]}.
            Computed on the client by reconciling anchorFrom.entryStateRequired
            with archetype.initialState. Shown to the LLM verbatim in the prompt
            and used by the validator's range-feasibility check — eliminates
            hidden 0-default mismatches that previously caused infinite retry
            loops.
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Previously generated GeneratedSegment that failed validation.
            When present alongside previousIssues, the LLM is asked to
            regenerate with awareness of what failed before.
        previousIssues:
          type: array
          items:
            type: string
          description: |
            Human-readable list of issues from the previous attempt
            (e.g. "ни один из 4 путей не приводит state в требования
            anchorTo"). Each entry is shown to the LLM verbatim.

    LiCardsRequest:
      type: object
      required:
        - storyMasterPrompt
        - count
      properties:
        storyMasterPrompt:
          type: string
          description: The story master prompt text describing the world and setting
        count:
          type: integer
          minimum: 1
          maximum: 6
          description: Number of love interest characters to generate
        hints:
          type: object
          properties:
            archetypes:
              type: array
              items:
                type: string
              description: Preferred archetype IDs (slow_burn, enemies_to_lovers, etc.)
            constraints:
              type: string
              description: Additional constraints for LI generation
          description: Optional hints to guide LI generation

    NarrationWebRequest:
      type: object
      required:
        - brief
        - storyAnchorFrom
        - storyAnchorTo
        - availableLIs
      properties:
        brief:
          type: object
          additionalProperties: true
          description: Brief context (world, tone, protagonist).
        storyAnchorFrom:
          type: object
          additionalProperties: true
          description: StoryAnchor of the source (segment entry).
        storyAnchorTo:
          type: object
          additionalProperties: true
          description: StoryAnchor of the target (segment exit).
        availableLIs:
          type: array
          items:
            type: object
            required:
              - liId
              - liName
              - roleInWorld
            properties:
              liId:
                type: string
              liName:
                type: string
              roleInWorld:
                type: string
          description: Love interests available for encounter in this location.
        existingFlags:
          type: array
          items:
            type: string
          description: Flags already established by prior story anchors.
        fromAnchorBeatText:
          type: string
          description: Beat scene text of the FROM anchor the player just saw; the web continues right after it.
        plannedEncounterLIs:
          type: array
          items:
            type: string
          description: LI ids whose encounters are planned at this anchor; the web must contain a trigger for each.
        fromLocation:
          type: object
          additionalProperties: true
          description: World-model location entity of the FROM anchor.
        toLocation:
          type: object
          additionalProperties: true
          description: World-model location entity of the TO anchor.
        route:
          type: array
          items:
            type: object
            required:
              - locationId
              - name
              - via
            properties:
              locationId:
                type: string
              name:
                type: string
              via:
                type: string
          description: Ordered location path from -> to; web scenes must move forward along it.
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Previously generated NarrationWeb that failed validation.
            When present alongside previousIssues, the LLM is asked to
            produce a corrected version.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    WorldModelRequest:
      type: object
      required:
        - brief
        - outline
      properties:
        brief:
          type: object
          additionalProperties: true
        outline:
          type: object
          additionalProperties: true
          description: StoryOutlinePlan with anchors (free-text locations) and edges.
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: Previously generated world model that failed validation.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    WorldCalendarRequest:
      type: object
      required:
        - brief
        - targets
      properties:
        brief:
          type: object
          additionalProperties: true
          description: Procedural narrative brief, embedded into the prompt as-is.
        castPlan:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            CastPlan with per-LI agenda location tags (workplace/hangout/home...);
            every tag must be mapped to at least one location. Null when agendas
            are stubbed client-side.
        targets:
          type: object
          required:
            - days
            - daypartsPerDay
            - slotCount
            - acts
          properties:
            days:
              type: integer
            daypartsPerDay:
              type: integer
            slotCount:
              type: integer
            acts:
              type: integer
          description: |
            Calendar sizes computed from brief.scale (computeCalendarTargets):
            the generated calendar must match them exactly.
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: Previously generated world+calendar that failed validation.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    SpineRequest:
      type: object
      required:
        - brief
        - worldModel
        - calendar
        - targets
      properties:
        brief:
          type: object
          additionalProperties: true
        worldModel:
          type: object
          additionalProperties: true
          description: World model (locations registry) the beats reference by id.
        calendar:
          type: object
          additionalProperties: true
          description: Discrete calendar (days, dayparts, actBoundaries).
        tagMap:
          type: object
          additionalProperties: true
          nullable: true
          description: Agenda-tag to location-ids mapping, or null.
        targets:
          type: object
          required:
            - beatCount
            - branchPointBudget
          properties:
            beatCount:
              type: integer
            branchPointBudget:
              type: integer
          description: |
            Budgets: number of beats (±1) and branch point limit
            (0 in the current format version — branchPoint kind forbidden).
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: Previously generated spine that failed validation.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    BeatPlanRequest:
      type: object
      required:
        - brief
        - outline
        - archetypeProfiles
        - encounterSlots
      properties:
        brief:
          type: object
          additionalProperties: true
          description: Brief context (world, tone, LI cast).
        outline:
          type: object
          additionalProperties: true
          description: StoryOutlinePlan with anchors pre-sorted topologically.
        archetypeProfiles:
          type: object
          additionalProperties: true
          description: Archetype profiles keyed by archetype id (requiredBeats source).
        encounterSlots:
          type: array
          items:
            type: object
            required:
              - anchorId
              - act
              - location
              - liIds
            properties:
              anchorId:
                type: string
              act:
                type: integer
              location:
                type: string
              liIds:
                type: array
                items:
                  type: string
          description: Allowed (anchor x LI) encounter slots.
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Previously generated BeatPlan that failed validation.
            When present alongside previousIssues, the LLM is asked to
            produce a corrected version.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    AnchorBeatRequest:
      type: object
      required:
        - brief
        - anchor
        - actPurpose
        - predecessorBeats
        - outgoingTargets
      properties:
        brief:
          type: object
          additionalProperties: true
          description: Brief context (world, tone, protagonist).
        anchor:
          type: object
          additionalProperties: true
          description: StoryAnchor whose event this beat scene plays on screen.
        actPurpose:
          type: string
          description: Purpose of the act this anchor belongs to (outline.acts[act-1].purpose).
        predecessorBeats:
          type: array
          items:
            type: object
            required:
              - anchorId
              - summary
            properties:
              anchorId:
                type: string
              summary:
                type: string
              beatText:
                type: string
          description: Ancestor beat chain in topological order (last 4).
        outgoingTargets:
          type: array
          items:
            type: object
            required:
              - anchorId
              - summary
              - location
              - timeMarker
            properties:
              anchorId:
                type: string
              summary:
                type: string
              location:
                type: string
              timeMarker:
                type: string
          description: Outgoing anchor targets requiring diegetic transition labels.
        location:
          type: object
          additionalProperties: true
          description: World-model location entity of this anchor.
        arrivedVia:
          type: string
          description: How the player physically arrives (via of the route's last leg).
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Previously generated AnchorBeat that failed validation.
            When present alongside previousIssues, the LLM is asked to
            produce a corrected version.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    EndingRequest:
      type: object
      required:
        - brief
        - outline
        - kind
      properties:
        brief:
          type: object
          additionalProperties: true
        outline:
          type: object
          additionalProperties: true
          description: Title, logline, acts and the resolution anchor.
        kind:
          type: string
          enum: [good, normal, bad]
        liCard:
          type: object
          additionalProperties: true
          nullable: true
          description: LI card, only for kind=good.
        endingTone:
          type: string
          description: Tone from archetype.endingProfile[kind].tone.
        liArcSummary:
          type: string
        finalEncounterGoal:
          type: string
        resolutionBeatText:
          type: string
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: Previously generated ending that failed validation.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    DialogueVariantRequest:
      type: object
      required:
        - brief
        - liCard
        - archetypeProfile
        - storyContext
        - bracket
        - stateRanges
      properties:
        brief:
          type: object
          additionalProperties: true
          description: Brief context.
        liCard:
          type: object
          additionalProperties: true
          description: Full LoveInterestCard of the character.
        archetypeProfile:
          type: object
          additionalProperties: true
          description: ArchetypeProfile for the character's archetype.
        storyContext:
          type: object
          required:
            - location
            - timeMarker
            - recentEvents
          properties:
            location:
              type: string
            timeMarker:
              type: string
            recentEvents:
              type: string
          description: Current story context (where/when the encounter happens).
        bracket:
          type: string
          enum:
            - positive
            - neutral
            - negative
          description: Relationship bracket determining dialogue tone.
        stateRanges:
          type: object
          additionalProperties:
            type: array
            items:
              type: number
            minItems: 2
            maxItems: 2
          description: Expected relationship state ranges at encounter entry.
        encounterContext:
          type: object
          additionalProperties: true
          description: |
            Arc context from the beat plan: encounter index/total, target
            beat, per-encounter goal, prior encounter goals, anchor beat text.
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Previously generated DialogueVariant that failed validation.
            When present alongside previousIssues, the LLM is asked to
            produce a corrected version.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
