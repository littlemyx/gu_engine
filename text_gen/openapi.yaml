openapi: 3.1.0
info:
  title: Text Generation API
  description: Async text generation for visual novel prototyping
  version: 1.0.0

servers:
  - url: http://localhost:3200

paths:
  /generate/storyMasterPrompt:
    post:
      operationId: generateStoryMasterPrompt
      summary: Generate a story master prompt (backbone) for a visual novel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoryMasterPromptRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/sceneText:
    post:
      operationId: generateSceneText
      summary: Generate scene text and outputs for a visual novel scene
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SceneTextRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/outline:
    post:
      operationId: generateOutline
      summary: Generate a high-level outline (acts + anchor skeleton) from a brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutlineRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /status:
    get:
      operationId: listBatches
      summary: List all batches with summary stats
      responses:
        '200':
          description: List of batch summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BatchSummary'

  /status/{batchId}:
    get:
      operationId: getBatchStatus
      summary: Get detailed status of a batch
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Batch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatus'
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    StoryMasterPromptRequest:
      type: object
      properties:
        userHint:
          type: string
          description: Optional author wishes / theme hint for the story generation

    GenerateResponse:
      type: object
      required:
        - batchId
        - itemIds
      properties:
        batchId:
          type: string
          format: uuid
        itemIds:
          type: array
          items:
            type: string

    CompletedTextItem:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        result:
          type: string
          description: Generated text content

    FailedItem:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        error:
          type: string

    BatchStatus:
      type: object
      required:
        - batchId
        - createdAt
        - total
        - completed
        - pending
        - failed
        - done
      properties:
        batchId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        total:
          type: integer
        completed:
          type: array
          items:
            $ref: '#/components/schemas/CompletedTextItem'
        pending:
          type: array
          items:
            type: string
        failed:
          type: array
          items:
            $ref: '#/components/schemas/FailedItem'
        done:
          type: boolean

    BatchSummary:
      type: object
      required:
        - batchId
        - createdAt
        - total
        - completed
        - pending
        - failed
      properties:
        batchId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        total:
          type: integer
        completed:
          type: integer
        pending:
          type: integer
        failed:
          type: integer

    SceneChainItem:
      type: object
      required:
        - sceneText
        - outputText
      properties:
        sceneText:
          type: string
          description: Text of a previous scene
        outputText:
          type: string
          description: The choice/output text that led from this scene to the next

    SceneCharacter:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Character name
        description:
          type: string
          description: Character description (appearance, personality, role)

    SceneTextRequest:
      type: object
      required:
        - storyMasterPrompt
        - sceneChain
        - depth
        - maxDepth
        - incomingOutputText
      properties:
        storyMasterPrompt:
          type: string
          description: The story master prompt (backbone of the story)
        sceneChain:
          type: array
          items:
            $ref: '#/components/schemas/SceneChainItem'
          description: Chain of previous scenes leading to this one
        depth:
          type: integer
          description: Depth of this scene from the root (0-based)
        maxDepth:
          type: integer
          description: Estimated maximum depth of the story tree
        incomingOutputText:
          type: string
          description: The output/choice text that leads into this scene
        characters:
          type: array
          items:
            $ref: '#/components/schemas/SceneCharacter'
          description: Characters present in this scene

    OutlineRequest:
      type: object
      required:
        - brief
        - archetypeProfiles
      properties:
        brief:
          type: object
          additionalProperties: true
          description: |
            Procedural narrative brief (Brief in client/src/narrative/types.ts).
            Treated as opaque JSON by text_gen — embedded into the prompt as-is.
        archetypeProfiles:
          type: object
          additionalProperties: true
          description: |
            Map of archetypeId -> ArchetypeProfile, only the archetypes
            referenced by the brief's loveInterests. Embedded into the prompt
            so the LLM knows which beats are required per route.

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
