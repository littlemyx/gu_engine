openapi: 3.1.0
info:
  title: Text Generation API
  description: Async text generation for visual novel prototyping
  version: 1.0.0

servers:
  - url: http://localhost:3200

paths:
  /generate/storyMasterPrompt:
    post:
      operationId: generateStoryMasterPrompt
      summary: Generate a story master prompt (backbone) for a visual novel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoryMasterPromptRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/sceneText:
    post:
      operationId: generateSceneText
      summary: Generate scene text and outputs for a visual novel scene
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SceneTextRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/worldCalendar:
    post:
      operationId: generateWorldCalendar
      summary: Build world locations, the discrete story calendar and the agenda-tag-to-location map
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorldCalendarRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/castPlan:
    post:
      operationId: generateCastPlan
      summary: Generate the cast plan (per-LI agendas with arc-stage goals and weekly location-tag patterns)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CastPlanRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/eventPool:
    post:
      operationId: generateEventPool
      summary: Generate a per-character event pool (storylet shells with guards, goals and effects, no prose)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventPoolRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/spine:
    post:
      operationId: generateSpine
      summary: Generate the story spine (beats with slot windows and guarded endings) over world and calendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpineRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/anchorBeat:
    post:
      operationId: generateAnchorBeat
      summary: Generate an on-screen beat scene for a story anchor with diegetic transition labels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnchorBeatRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/anchorTransition:
    post:
      operationId: generateAnchorTransition
      summary: Generate diegetic daypart-transition scenes (go to class, go to sleep)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnchorTransitionRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/ending:
    post:
      operationId: generateEnding
      summary: Generate an epilogue variant (good per-LI, or shared normal/bad)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndingRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/dialogueUnit:
    post:
      operationId: generateDialogueUnit
      summary: Generate a first-class dialogue unit (typed choices, closing nodes) for a character encounter at a given relationship bracket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DialogueUnitRequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/dialogueQA:
    post:
      operationId: generateDialogueQA
      summary: LLM-critic pass over a generated dialogue unit (answers, tone, closing completeness)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DialogueQARequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /generate/storyLeafQA:
    post:
      operationId: generateStoryLeafQA
      summary: LLM-critic pass over one branch leaf of the story (beat contradictions, knowledge continuity, finale consistency)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoryLeafQARequest'
      responses:
        '200':
          description: Generation batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /status:
    get:
      operationId: listBatches
      summary: List all batches with summary stats
      responses:
        '200':
          description: List of batch summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BatchSummary'

  /status/{batchId}:
    get:
      operationId: getBatchStatus
      summary: Get detailed status of a batch
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Batch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatus'
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    StoryMasterPromptRequest:
      type: object
      properties:
        userHint:
          type: string
          description: Optional author wishes / theme hint for the story generation

    GenerateResponse:
      type: object
      required:
        - batchId
        - itemIds
      properties:
        batchId:
          type: string
          format: uuid
        itemIds:
          type: array
          items:
            type: string

    CompletedTextItem:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        result:
          type: string
          description: Generated text content

    FailedItem:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        error:
          type: string

    BatchStatus:
      type: object
      required:
        - batchId
        - createdAt
        - total
        - completed
        - pending
        - failed
        - done
      properties:
        batchId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        total:
          type: integer
        completed:
          type: array
          items:
            $ref: '#/components/schemas/CompletedTextItem'
        pending:
          type: array
          items:
            type: string
        failed:
          type: array
          items:
            $ref: '#/components/schemas/FailedItem'
        done:
          type: boolean

    BatchSummary:
      type: object
      required:
        - batchId
        - createdAt
        - total
        - completed
        - pending
        - failed
      properties:
        batchId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        total:
          type: integer
        completed:
          type: integer
        pending:
          type: integer
        failed:
          type: integer

    SceneChainItem:
      type: object
      required:
        - sceneText
        - outputText
      properties:
        sceneText:
          type: string
          description: Text of a previous scene
        outputText:
          type: string
          description: The choice/output text that led from this scene to the next

    SceneCharacter:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Character name
        description:
          type: string
          description: Character description (appearance, personality, role)

    SceneTextRequest:
      type: object
      required:
        - storyMasterPrompt
        - sceneChain
        - depth
        - maxDepth
        - incomingOutputText
      properties:
        storyMasterPrompt:
          type: string
          description: The story master prompt (backbone of the story)
        sceneChain:
          type: array
          items:
            $ref: '#/components/schemas/SceneChainItem'
          description: Chain of previous scenes leading to this one
        depth:
          type: integer
          description: Depth of this scene from the root (0-based)
        maxDepth:
          type: integer
          description: Estimated maximum depth of the story tree
        incomingOutputText:
          type: string
          description: The output/choice text that leads into this scene
        characters:
          type: array
          items:
            $ref: '#/components/schemas/SceneCharacter'
          description: Characters present in this scene

    WorldCalendarRequest:
      type: object
      required:
        - brief
        - targets
      properties:
        brief:
          type: object
          additionalProperties: true
          description: Procedural narrative brief, embedded into the prompt as-is.
        castPlan:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            CastPlan with per-LI agenda location tags (workplace/hangout/home...);
            every tag must be mapped to at least one location. Null when agendas
            are stubbed client-side.
        targets:
          type: object
          required:
            - days
            - daypartsPerDay
            - slotCount
            - acts
          properties:
            days:
              type: integer
            daypartsPerDay:
              type: integer
            slotCount:
              type: integer
            acts:
              type: integer
          description: |
            Calendar sizes computed from brief.scale (computeCalendarTargets):
            the generated calendar must match them exactly.
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: Previously generated world+calendar that failed validation.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    CastPlanRequest:
      type: object
      required:
        - brief
        - archetypeProfiles
      properties:
        brief:
          type: object
          additionalProperties: true
          description: Procedural narrative brief, embedded into the prompt as-is.
        archetypeProfiles:
          type: object
          additionalProperties: true
          description: |
            Map of archetypeId -> ArchetypeProfile, only the archetypes
            referenced by the brief's loveInterests.
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: Previously generated cast plan that failed validation.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    EventPoolRequest:
      type: object
      required:
        - brief
        - liCard
        - agenda
        - scheduleExcerpt
        - spineBeats
        - calendar
        - targets
      properties:
        brief:
          type: object
          additionalProperties: true
          description: Brief context (world, tone, protagonist).
        liCard:
          type: object
          additionalProperties: true
          description: LoveInterestCard of the character (opaque JSON).
        agenda:
          type: object
          additionalProperties: true
          description: CastAgenda of the character (goals/weeklyPattern/locationTags).
        scheduleExcerpt:
          type: array
          items:
            type: object
            required:
              - slot
              - locationId
            properties:
              slot:
                type: integer
              locationId:
                type: string
          description: Slots where the character is on stage (non-null schedule positions only).
        spineBeats:
          type: array
          items:
            type: object
            required:
              - id
              - summary
              - window
            properties:
              id:
                type: string
              summary:
                type: string
              window:
                type: object
                required:
                  - fromSlot
                  - toSlot
                properties:
                  fromSlot:
                    type: integer
                  toSlot:
                    type: integer
          description: Spine beats the character participates in (id/summary/window).
        calendar:
          type: object
          required:
            - slotCount
            - dayparts
            - actBoundaries
          properties:
            slotCount:
              type: integer
            dayparts:
              type: array
              items:
                type: string
            actBoundaries:
              type: array
              items:
                type: integer
          description: Calendar sizes for window validation context.
        targets:
          type: object
          required:
            - unitsPerStage
          properties:
            unitsPerStage:
              type: integer
          description: Budgets — target units per arc stage.
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: Previously generated pool that failed validation.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    SpineRequest:
      type: object
      required:
        - brief
        - worldModel
        - calendar
        - targets
      properties:
        brief:
          type: object
          additionalProperties: true
        worldModel:
          type: object
          additionalProperties: true
          description: World model (locations registry) the beats reference by id.
        calendar:
          type: object
          additionalProperties: true
          description: Discrete calendar (days, dayparts, actBoundaries).
        tagMap:
          type: object
          additionalProperties: true
          nullable: true
          description: Agenda-tag to location-ids mapping, or null.
        targets:
          type: object
          required:
            - beatCount
            - branchPointBudget
          properties:
            beatCount:
              type: integer
            branchPointBudget:
              type: integer
          description: |
            Budgets: number of beats (±1) and branch point limit
            (0 in the current format version — branchPoint kind forbidden).
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: Previously generated spine that failed validation.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    AnchorTransitionRequest:
      type: object
      required:
        - brief
        - dayparts
        - homeLocationName
      properties:
        brief:
          type: object
          additionalProperties: true
        dayparts:
          type: array
          items:
            type: string
          description: Calendar dayparts in order; the last one is where the hero goes to sleep.
        homeLocationName:
          type: string
          description: Name of the hero's home location — where sleep leads.

    AnchorBeatRequest:
      type: object
      required:
        - brief
        - anchor
        - actPurpose
        - predecessorBeats
        - outgoingTargets
      properties:
        brief:
          type: object
          additionalProperties: true
          description: Brief context (world, tone, protagonist).
        anchor:
          type: object
          additionalProperties: true
          description: StoryAnchor whose event this beat scene plays on screen.
        actPurpose:
          type: string
          description: Purpose of the act this anchor belongs to (outline.acts[act-1].purpose).
        predecessorBeats:
          type: array
          items:
            type: object
            required:
              - anchorId
              - summary
            properties:
              anchorId:
                type: string
              summary:
                type: string
              beatText:
                type: string
          description: Ancestor beat chain in topological order (last 4).
        outgoingTargets:
          type: array
          items:
            type: object
            required:
              - anchorId
              - summary
              - location
              - timeMarker
            properties:
              anchorId:
                type: string
              summary:
                type: string
              location:
                type: string
              timeMarker:
                type: string
          description: Outgoing anchor targets requiring diegetic transition labels.
        location:
          type: object
          additionalProperties: true
          description: World-model location entity of this anchor.
        arrivedVia:
          type: string
          description: How the player physically arrives (via of the route's last leg).
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Previously generated AnchorBeat that failed validation.
            When present alongside previousIssues, the LLM is asked to
            produce a corrected version.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    EndingRequest:
      type: object
      required:
        - brief
        - outline
        - kind
      properties:
        brief:
          type: object
          additionalProperties: true
        outline:
          type: object
          additionalProperties: true
          description: Title, logline, acts and the resolution anchor.
        kind:
          type: string
          enum: [good, normal, bad]
        liCard:
          type: object
          additionalProperties: true
          nullable: true
          description: LI card, only for kind=good.
        endingTone:
          type: string
          description: Tone from archetype.endingProfile[kind].tone.
        liArcSummary:
          type: string
        finalEncounterGoal:
          type: string
        resolutionBeatText:
          type: string
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: Previously generated ending that failed validation.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    DialogueUnitRequest:
      type: object
      required:
        - brief
        - liCard
        - archetypeProfile
        - storyContext
        - bracket
        - stateRanges
      properties:
        brief:
          type: object
          additionalProperties: true
          description: Brief context.
        liCard:
          type: object
          additionalProperties: true
          description: Full LoveInterestCard of the character.
        archetypeProfile:
          type: object
          additionalProperties: true
          description: ArchetypeProfile for the character's archetype.
        storyContext:
          type: object
          required:
            - location
            - timeMarker
            - recentEvents
          properties:
            location:
              type: string
            timeMarker:
              type: string
            recentEvents:
              type: string
          description: Current story context (where/when the encounter happens).
        bracket:
          type: string
          enum:
            - positive
            - neutral
            - negative
          description: Relationship bracket determining dialogue tone.
        stateRanges:
          type: object
          additionalProperties:
            type: array
            items:
              type: number
            minItems: 2
            maxItems: 2
          description: Expected relationship state ranges at encounter entry.
        encounterContext:
          type: object
          additionalProperties: true
          description: |
            Arc context from the beat plan: encounter index/total, target
            beat, per-encounter goal, prior encounter goals, anchor beat text.
        previousAttempt:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Previously generated DialogueUnit that failed validation.
            When present alongside previousIssues, the LLM is asked to
            produce a corrected version.
        previousIssues:
          type: array
          items:
            type: string
          description: Validation issue messages from the previous attempt.

    DialogueQARequest:
      type: object
      required:
        - unit
        - bracket
        - liCardSummary
      properties:
        unit:
          type: object
          additionalProperties: true
          description: The generated DialogueUnit to review (opaque JSON).
        bracket:
          type: string
          enum:
            - positive
            - neutral
            - negative
          description: Relationship bracket the unit was generated for.
        liCardSummary:
          type: string
          description: Short summary of the LI card (name, personality, speech style).

    StoryLeafQARequest:
      type: object
      required:
        - leafLabel
        - beatSummariesOrdered
        - endings
        - briefTone
      properties:
        leafLabel:
          type: string
          description: Which branch-outcome combination forms this leaf ("bp1=o1, bp2=o2").
        beatSummariesOrdered:
          type: array
          description: Beats of the leaf in assigned-slot order.
          items:
            type: object
            required:
              - id
              - summary
              - timeMarker
            properties:
              id:
                type: string
              summary:
                type: string
              timeMarker:
                type: string
        endings:
          type: array
          description: Spine endings available to this story.
          items:
            type: object
            required:
              - id
              - kind
            properties:
              id:
                type: string
              kind:
                type: string
              summary:
                type: string
        briefTone:
          type: string
          description: World tone digest from the brief (mood, themes, intensity).

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
